name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: googleapis/release-please-action@7987652d64b4581673a76e33ad5e98e3dd56832f  # v4.1.3
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - if: ${{ steps.release.outputs.release_created }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # Install devDependencies so the `prepack` lifecycle hook can
      # compile src/ → dist/ via `tsc`. Without this, `npm publish`
      # invokes prepack with typescript missing and aborts.
      # `npm ci` is not usable because package-lock.json is gitignored
      # by repo convention.
      - if: ${{ steps.release.outputs.release_created }}
        run: npm install --no-audit --no-fund

      - if: ${{ steps.release.outputs.release_created }}
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Notify specrails-web of new release
        if: ${{ steps.release.outputs.release_created }}
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697  # v4.0.1
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          repository: fjpulidop/specrails-web
          event-type: specrails-core-released
          client-payload: '{"core_version": "${{ steps.release.outputs.tag_name }}"}'
