name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: googleapis/release-please-action@7987652d64b4581673a76e33ad5e98e3dd56832f  # v4.1.3
        id: release
        with:
          release-type: node
          token: ${{ secrets.GITHUB_TOKEN }}

      - if: ${{ steps.release.outputs.release_created }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - if: ${{ steps.release.outputs.release_created }}
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Notify specrails-hub of new release
        if: ${{ steps.release.outputs.release_created }}
        uses: peter-evans/repository-dispatch@ff45666b9427631e3450c54a1bcbee4d9ff4d7c0  # v3.0.0
        with:
          token: ${{ secrets.HUB_DISPATCH_TOKEN }}
          repository: fjpulidop/specrails-hub
          event-type: specrails-core-released
          client-payload: '{"core_version": "${{ steps.release.outputs.tag_name }}"}'

      - name: Notify specrails-web of new release
        if: ${{ steps.release.outputs.release_created }}
        uses: peter-evans/repository-dispatch@ff45666b9427631e3450c54a1bcbee4d9ff4d7c0  # v3.0.0
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          repository: fjpulidop/specrails-web
          event-type: specrails-core-released
          client-payload: '{"core_version": "${{ steps.release.outputs.tag_name }}"}'
