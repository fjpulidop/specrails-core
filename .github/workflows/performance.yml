name: Performance Regression

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  performance:
    name: Performance Regression Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 20

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@c65cd883420fd2eb864698a825fc4162dd94482c  # v44.5.7
        with:
          separator: ","

      - name: Restore performance history
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
        with:
          path: .specrails/perf-history.jsonl
          key: perf-history-${{ github.ref_name }}
          restore-keys: |
            perf-history-main
            perf-history-

      - name: Run performance regression check
        id: perf-check
        env:
          MODIFIED_FILES_LIST: ${{ steps.changed-files.outputs.all_changed_files }}
          PERF_BASELINE_BRANCH: main
          PERF_REGRESSION_TIME_PCT: ${{ vars.PERF_REGRESSION_TIME_PCT || '20' }}
          PERF_REGRESSION_MEMORY_PCT: ${{ vars.PERF_REGRESSION_MEMORY_PCT || '15' }}
          PERF_REGRESSION_THROUGHPUT_PCT: ${{ vars.PERF_REGRESSION_THROUGHPUT_PCT || '15' }}
          PERF_CRITICAL_TIME_PCT: ${{ vars.PERF_CRITICAL_TIME_PCT || '50' }}
          PERF_CRITICAL_MEMORY_PCT: ${{ vars.PERF_CRITICAL_MEMORY_PCT || '40' }}
          PERF_CRITICAL_THROUGHPUT_PCT: ${{ vars.PERF_CRITICAL_THROUGHPUT_PCT || '40' }}
        run: |
          # Run sr-performance-reviewer agent via specrails-core CLI
          # The agent outputs a report ending with PERF_STATUS: <status>
          OUTPUT=$(node bin/specrails-core.js perf-check \
            --files "$MODIFIED_FILES_LIST" \
            --context "PR #${{ github.event.number }}: ${{ github.event.pull_request.title }}" \
            2>&1) || true

          echo "$OUTPUT"
          echo "report<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          STATUS=$(echo "$OUTPUT" | tail -1 | sed 's/PERF_STATUS: //')
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        if: always()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8.0.0
        with:
          script: |
            const status = '${{ steps.perf-check.outputs.status }}';
            const report = `${{ steps.perf-check.outputs.report }}`;

            const statusEmoji = {
              PASS: '✅',
              REGRESSION: '⚠️',
              CRITICAL: '🚨',
              NO_BASELINE: 'ℹ️',
              NO_PERF_IMPACT: '⏭️',
            }[status] || '❓';

            const body = [
              `## ${statusEmoji} Performance Regression Check — \`${status}\``,
              '',
              '```',
              report,
              '```',
              '',
              `*Triggered by commit \`${{ github.sha }}\` on PR #${{ github.event.number }}*`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes('Performance Regression Check')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail on critical regression
        if: steps.perf-check.outputs.status == 'CRITICAL'
        run: |
          echo "::error::Critical performance regression detected. See PR comment for details."
          exit 1

      - name: Save performance history
        if: always()
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
        with:
          path: .specrails/perf-history.jsonl
          key: perf-history-${{ github.ref_name }}-${{ github.sha }}
